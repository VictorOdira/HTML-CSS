<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients by Department - Full Rings</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f8f9fa; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        /* Card Container */
        .chart-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 480px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h3 { margin: 0; font-size: 18px; color: #1a1a1a; font-weight: 600; }

        .dropdown {
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            background: #fff;
        }

        .content {
            display: flex;
            align-items: center;
        }

        /* Chart Area */
        #chart { width: 60%; }

        /* Custom Legend on the Right */
        .legend { width: 40%; list-style: none; padding-left: 20px; margin: 0; }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            color: #475569;
            font-weight: 500;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="chart-card">
    <div class="header">
        <h3>Patients by Department</h3>
        <div class="dropdown">Today ▾</div>
    </div>

    <div class="content">
        <div id="chart"></div>

        <ul class="legend">
            <li class="legend-item"><span class="dot" style="background: #4A72FF;"></span> General Medicine</li>
            <li class="legend-item"><span class="dot" style="background: #50CD89;"></span> Orthopedics</li>
            <li class="legend-item"><span class="dot" style="background: #FFAD5F;"></span> Cardiology</li>
            <li class="legend-item"><span class="dot" style="background: #F1416C;"></span> Gynecology</li>
        </ul>
    </div>
</div>

<script>
    var options = {
        series: [85, 72, 65, 48], // The percentage of the circle filled
        chart: {
            height: 300,
            type: 'radialBar',
        },
        plotOptions: {
            radialBar: {
                offsetY: 0,
                startAngle: 0,
                endAngle: 360, // Set to 360 for complete circles
                hollow: {
                    margin: 5,
                    size: '35%', // Inner hole size
                    background: 'transparent',
                },
                track: {
                    background: '#f1f5f9', // The "empty" gray part of the circle
                    strokeWidth: '90%', // Thickness of the track
                    margin: 8, // Space between the rings
                },
                dataLabels: {
                    name: { show: false },
                    value: {
                        fontSize: '32px',
                        fontWeight: '700',
                        offsetY: 10,
                        color: '#1e293b',
                        formatter: function() { return '320'; }
                    },
                    total: {
                        show: true,
                        label: 'Total',
                        color: '#94a3b8',
                        fontSize: '14px',
                        fontWeight: '500',
                        formatter: function() { return 'Total'; }
                    }
                }
            }
        },
        colors: ['#4A72FF', '#50CD89', '#FFAD5F', '#F1416C'],
        stroke: {
            lineCap: 'round' // Keeps the rounded "pill" ends
        },
        labels: ['General Medicine', 'Orthopedics', 'Cardiology', 'Gynecology'],
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();
</script>

</body>
</html>
